name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

# We use yarn locally (yarn.lock is the source of truth). npm ci fights
# the @visx React-19 peer mismatch unless legacy-peer-deps is set, and
# legacy-peer-deps triggers npm's optional-native-binding bug (cli#4828)
# for rolldown/esbuild binaries. Yarn just warns and installs cleanly.

jobs:
  lint:
    name: Lint (TS)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
          cache-dependency-path: my-app/yarn.lock

      - name: Rewrite git+ssh → https (transitive deps use ssh://git@github.com)
        run: git config --global url."https://github.com/".insteadOf ssh://git@github.com/

      - name: Install dependencies
        working-directory: my-app
        run: yarn install --frozen-lockfile

      - name: ESLint
        working-directory: my-app
        run: yarn lint

  typecheck:
    name: Typecheck (TS)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Hard-fail: tsc --noEmit must be clean.
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
          cache-dependency-path: my-app/yarn.lock

      - name: Rewrite git+ssh → https (transitive deps use ssh://git@github.com)
        run: git config --global url."https://github.com/".insteadOf ssh://git@github.com/

      - name: Install dependencies
        working-directory: my-app
        run: yarn install --frozen-lockfile

      - name: tsc --noEmit
        working-directory: my-app
        run: yarn typecheck

  unit:
    name: Unit + integration (vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
          cache-dependency-path: my-app/yarn.lock

      - name: Rewrite git+ssh → https (transitive deps use ssh://git@github.com)
        run: git config --global url."https://github.com/".insteadOf ssh://git@github.com/

      - name: Install dependencies
        working-directory: my-app
        run: yarn install --frozen-lockfile

      - name: Run vitest with coverage
        working-directory: my-app
        run: yarn test:coverage

      - name: Upload coverage (TS)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-ts
          path: my-app/tests/results/coverage/
          if-no-files-found: warn

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: vitest-results
          path: my-app/tests/results/
          if-no-files-found: ignore
