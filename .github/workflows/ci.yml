name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  lint:
    name: Lint (TS)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: my-app/package-lock.json

      - name: Install dependencies
        working-directory: my-app
        run: npm ci --no-audit --no-fund

      - name: ESLint
        working-directory: my-app
        run: npm run lint

  typecheck:
    name: Typecheck (TS)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Hard-fail: tsc --noEmit must be clean. The pre-existing baseline was
    # cleaned up in the chore(types) PR; any new errors here gate merges.
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: my-app/package-lock.json

      - name: Install dependencies
        working-directory: my-app
        run: npm ci --no-audit --no-fund

      - name: tsc --noEmit
        working-directory: my-app
        run: npm run typecheck

  unit:
    name: Unit + integration (vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: my-app/package-lock.json

      - name: Install dependencies
        working-directory: my-app
        run: npm ci --no-audit --no-fund

      - name: Run vitest with coverage
        working-directory: my-app
        run: npm run test:coverage

      - name: Upload coverage (TS)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-ts
          path: my-app/tests/results/coverage/
          if-no-files-found: warn

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: vitest-results
          path: my-app/tests/results/
          if-no-files-found: ignore
